apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: zigzag-backend
  namespace: alphashopper
  labels:
    app.kubernetes.io/name: zigzag-backend
    app.kubernetes.io/track: stable
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - alphashopper
  selector:
    matchLabels:
      app.kubernetes.io/name: zigzag-backend
      app.kubernetes.io/component: backend
      app.kubernetes.io/track: stable
  targetLabels:
    - app.kubernetes.io/name
    - app.kubernetes.io/component
    - app.kubernetes.io/track
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
