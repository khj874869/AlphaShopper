apiVersion: v1
kind: Namespace
metadata:
  name: alphashopper
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zigzag-backend-config
  namespace: alphashopper
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8080"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
  SERVER_SHUTDOWN: graceful
  SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE: 30s
  SERVER_COMPRESSION_ENABLED: "true"
  SERVER_COMPRESSION_MIN_RESPONSE_SIZE: "1024"
  SERVER_TOMCAT_THREADS_MAX: "300"
  SERVER_TOMCAT_THREADS_MIN_SPARE: "40"
  SERVER_TOMCAT_ACCEPT_COUNT: "200"
  SERVER_TOMCAT_MAX_CONNECTIONS: "16384"
  SERVER_TOMCAT_CONNECTION_TIMEOUT: 5s
  SERVER_TOMCAT_KEEP_ALIVE_TIMEOUT: 20s
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "40"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "10"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
  SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT: "5000"
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1800000"
  SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME: "300000"
  APP_FRONTEND_BASE_URL: https://shop.example.com
  APP_FRONTEND_ALLOWED_ORIGINS: https://shop.example.com
  APP_NETWORK_TRUST_FORWARDED_HEADERS: "true"
  APP_MANAGEMENT_PROMETHEUS_PUBLIC_ACCESS: "false"
  APP_MANAGEMENT_PROMETHEUS_ALLOWED_IP_RANGES: 10.0.0.0/24
  APP_PAYMENT_PROVIDER: toss
  APP_PAYMENT_TOSS_WEBHOOK_ALLOWED_IP_RANGES: 203.0.113.0/24
  APP_PAYMENT_TOSS_WEBHOOK_MAX_SKEW_SECONDS: "900"
  APP_SEED_DEMO_DATA_ENABLED: "false"
  APP_AI_ALLOW_ANONYMOUS: "false"
  APP_REDIS_ENABLED: "true"
  APP_REDIS_KEY_PREFIX: alphashopper
  APP_AI_RATE_LIMIT_ENABLED: "true"
  APP_AI_RATE_LIMIT_WINDOW_SECONDS: "60"
  APP_AI_RATE_LIMIT_MAX_REQUESTS: "30"
  APP_AI_LLM_ENABLED: "true"
  APP_AI_LLM_BASE_URL: https://llm-gateway.example.internal
  APP_AI_LLM_MODEL: alphashopper-assistant
  APP_AI_LLM_TIMEOUT_MS: "8000"
  APP_SEARCH_ENABLED: "true"
  APP_SEARCH_REINDEX_ON_STARTUP: "false"
  APP_SEARCH_RECREATE_INDEX_ON_REINDEX: "false"
  APP_KAFKA_AUTO_CREATE_TOPICS: "false"
  APP_KAFKA_ORDER_NOTIFICATIONS_TOPIC: order-notifications
  APP_KAFKA_ORDER_NOTIFICATIONS_DLT_TOPIC: order-notifications.DLT
  APP_KAFKA_NOTIFICATION_RETRY_MAX_ATTEMPTS: "3"
  APP_KAFKA_NOTIFICATION_RETRY_BACKOFF_MS: "1000"
  APP_KAFKA_NOTIFICATION_DLT_REPLAY_CONSUMER_GROUP_ID: zigzag-notification-dlt-replay
  APP_KAFKA_NOTIFICATION_DLT_REPLAY_POLL_TIMEOUT_MS: "3000"
  APP_KAFKA_NOTIFICATION_DLT_REPLAY_SEND_TIMEOUT_MS: "10000"
  KAFKA_CONSUMER_GROUP_ID: zigzag-notification-consumer
  APP_MAIL_FROM_ADDRESS: no-reply@example.com
  SMTP_PORT: "587"
  SMTP_AUTH: "true"
  SMTP_STARTTLS_ENABLE: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: zigzag-backend-secrets
  namespace: alphashopper
type: Opaque
stringData:
  DB_URL: jdbc:postgresql://postgres.example.internal:5432/alphashopper
  DB_USERNAME: alphashopper
  DB_PASSWORD: change-me
  APP_JWT_SECRET: replace-with-a-long-random-secret
  APP_PAYMENT_TOSS_SECRET_KEY: live_sk_replace_me
  APP_AI_LLM_API_KEY: replace-me
  REDIS_HOST: redis.example.internal
  REDIS_PORT: "6379"
  REDIS_PASSWORD: change-me
  ELASTICSEARCH_URL: https://search.example.internal:9200
  KAFKA_BOOTSTRAP_SERVERS: kafka-1.example.internal:9092,kafka-2.example.internal:9092,kafka-3.example.internal:9092
  SMTP_HOST: smtp.example.com
  SMTP_USERNAME: smtp-user
  SMTP_PASSWORD: change-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigzag-backend
  namespace: alphashopper
spec:
  replicas: 3
  revisionHistoryLimit: 5
  minReadySeconds: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: zigzag-backend
  template:
    metadata:
      labels:
        app: zigzag-backend
    spec:
      terminationGracePeriodSeconds: 45
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: zigzag-backend
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: zigzag-backend
      containers:
        - name: backend
          image: ghcr.io/your-org/zigzag-shop-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: zigzag-backend-config
            - secretRef:
                name: zigzag-backend-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 20"]
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zigzag-backend
  namespace: alphashopper
spec:
  selector:
    app: zigzag-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zigzag-backend-pdb
  namespace: alphashopper
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: zigzag-backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zigzag-backend
  namespace: alphashopper
spec:
  minReplicas: 3
  maxReplicas: 12
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zigzag-backend
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
