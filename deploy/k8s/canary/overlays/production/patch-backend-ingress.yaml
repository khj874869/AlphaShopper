apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zigzag-backend-canary
spec:
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zigzag-backend-canary
                port:
                  number: 8080
