apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alphashopper-web-canary
spec:
  rules:
    - host: staging-shop.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alphashopper-web-canary
                port:
                  number: 3000
