apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphashopper-web-canary
  namespace: alphashopper
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: alphashopper-web-canary
  template:
    metadata:
      labels:
        app: alphashopper-web-canary
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: ghcr.io/your-org/alphashopper-web:canary
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: alphashopper-web-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alphashopper-web-canary
  namespace: alphashopper
spec:
  selector:
    app: alphashopper-web-canary
  ports:
    - name: http
      port: 3000
      targetPort: http
