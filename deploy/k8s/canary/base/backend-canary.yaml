apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigzag-backend-canary
  namespace: alphashopper
  labels:
    app.kubernetes.io/name: zigzag-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/track: canary
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: zigzag-backend-canary
  template:
    metadata:
      labels:
        app: zigzag-backend-canary
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: backend
          image: ghcr.io/your-org/zigzag-shop-backend:canary
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: zigzag-backend-config
            - secretRef:
                name: zigzag-backend-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 20"]
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zigzag-backend-canary
  namespace: alphashopper
  labels:
    app.kubernetes.io/name: zigzag-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/track: canary
spec:
  selector:
    app: zigzag-backend-canary
  ports:
    - name: http
      port: 8080
      targetPort: http
