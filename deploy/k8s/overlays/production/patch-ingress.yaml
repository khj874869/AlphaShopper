apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alphashopper
spec:
  tls:
    - hosts:
        - shop.example.com
        - api.example.com
      secretName: alphashopper-production-tls
  rules:
    - host: shop.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alphashopper-web
                port:
                  number: 3000
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zigzag-backend
                port:
                  number: 8080
