apiVersion: v1
kind: ConfigMap
metadata:
  name: alphashopper-web-config
  namespace: alphashopper
data:
  NODE_ENV: production
  PORT: "3000"
  HOSTNAME: 0.0.0.0
  NEXT_PUBLIC_API_BASE_URL: https://api.example.com
  NEXT_PUBLIC_PAYMENT_PROVIDER: toss
  NEXT_PUBLIC_ENABLE_DEMO_ACCOUNTS: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphashopper-web
  namespace: alphashopper
spec:
  replicas: 3
  revisionHistoryLimit: 5
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: alphashopper-web
  template:
    metadata:
      labels:
        app: alphashopper-web
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: alphashopper-web
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: alphashopper-web
      containers:
        - name: web
          image: ghcr.io/your-org/alphashopper-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: alphashopper-web-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alphashopper-web
  namespace: alphashopper
spec:
  selector:
    app: alphashopper-web
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: alphashopper-web-pdb
  namespace: alphashopper
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: alphashopper-web
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alphashopper-web
  namespace: alphashopper
spec:
  minReplicas: 3
  maxReplicas: 10
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alphashopper-web
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
