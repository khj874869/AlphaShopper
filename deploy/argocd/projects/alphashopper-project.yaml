apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: alphashopper
  namespace: argocd
spec:
  description: AlphaShopper applications managed by Argo CD
  sourceRepos:
    - '*'
  destinations:
    - namespace: alphashopper-staging
      server: https://kubernetes.default.svc
    - namespace: alphashopper-production
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  syncWindows:
    - kind: deny
      schedule: '* * * * *'
      duration: 24h
      applications:
        - alphashopper-production-*
      manualSync: true
