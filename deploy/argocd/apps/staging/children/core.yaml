apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alphashopper-staging-core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: alphashopper
  source:
    repoURL: https://github.com/khj874869/AlphaShopper.git
    targetRevision: main
    path: deploy/k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: alphashopper-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
