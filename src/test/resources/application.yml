spring:
  profiles:
    active: test
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-order-notification-group
    listener:
      auto-startup: false
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    open-in-view: false

app:
  frontend:
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000
  payment:
    provider: fake
  seed:
    demo-data:
      enabled: false
  search:
    enabled: false
    reindex-on-startup: false
  kafka:
    auto-create-topics: false
    retry:
      max-attempts: 3
      backoff-ms: 1000
    dlt-replay:
      consumer-group-id: test-order-notification-dlt-replay
      poll-timeout-ms: 100
      send-timeout-ms: 1000
    topics:
      order-notifications: order-notifications
      order-notifications-dlt: order-notifications.DLT
  mail:
    from-address: test@alphashopper.local
  jwt:
    secret: alphashopper-jwt-secret-key-2026-04-15-must-be-long-enough
    access-token-expiration-minutes: 180
