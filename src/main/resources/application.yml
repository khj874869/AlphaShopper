spring:
  application:
    name: zigzag-shop
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate: true
    validate-migration-naming: true
    baseline-on-migrate: false
    out-of-order: false
  jackson:
    time-zone: ${APP_TIME_ZONE:Asia/Seoul}
  data:
    elasticsearch:
      repositories:
        enabled: ${app.search.enabled:false}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      repositories:
        enabled: false
  lifecycle:
    timeout-per-shutdown-phase: ${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE:30s}
  datasource:
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:30}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:10}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:300000}

server:
  port: ${SERVER_PORT:8080}
  shutdown: ${SERVER_SHUTDOWN:graceful}
  compression:
    enabled: ${SERVER_COMPRESSION_ENABLED:true}
    min-response-size: ${SERVER_COMPRESSION_MIN_RESPONSE_SIZE:1024}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
    connection-timeout: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:5s}
    keep-alive-timeout: ${SERVER_TOMCAT_KEEP_ALIVE_TIMEOUT:20s}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,ping,db
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  pattern:
    level: "%5p requestId=%X{requestId:-}"
  level:
    org.hibernate.SQL: ${APP_LOG_SQL_LEVEL:info}

app:
  network:
    trust-forwarded-headers: ${APP_NETWORK_TRUST_FORWARDED_HEADERS:false}
  auth:
    cookie:
      name: ${APP_AUTH_COOKIE_NAME:alphashopper_access_token}
      secure: ${APP_AUTH_COOKIE_SECURE:false}
      same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
  management:
    prometheus:
      public-access: ${APP_MANAGEMENT_PROMETHEUS_PUBLIC_ACCESS:true}
      allowed-ip-ranges: ${APP_MANAGEMENT_PROMETHEUS_ALLOWED_IP_RANGES:}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
    allowed-origins: ${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  search:
    enabled: ${APP_SEARCH_ENABLED:false}
    reindex-on-startup: ${APP_SEARCH_REINDEX_ON_STARTUP:false}
    recreate-index-on-reindex: ${APP_SEARCH_RECREATE_INDEX_ON_REINDEX:false}
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
    key-prefix: ${APP_REDIS_KEY_PREFIX:alphashopper}
  kafka:
    auto-create-topics: ${APP_KAFKA_AUTO_CREATE_TOPICS:false}
    retry:
      max-attempts: ${APP_KAFKA_NOTIFICATION_RETRY_MAX_ATTEMPTS:3}
      backoff-ms: ${APP_KAFKA_NOTIFICATION_RETRY_BACKOFF_MS:1000}
    dlt-replay:
      consumer-group-id: ${APP_KAFKA_NOTIFICATION_DLT_REPLAY_CONSUMER_GROUP_ID:zigzag-notification-dlt-replay}
      poll-timeout-ms: ${APP_KAFKA_NOTIFICATION_DLT_REPLAY_POLL_TIMEOUT_MS:3000}
      send-timeout-ms: ${APP_KAFKA_NOTIFICATION_DLT_REPLAY_SEND_TIMEOUT_MS:10000}
    topics:
      order-notifications: ${APP_KAFKA_ORDER_NOTIFICATIONS_TOPIC:order-notifications}
      order-notifications-dlt: ${APP_KAFKA_ORDER_NOTIFICATIONS_DLT_TOPIC:order-notifications.DLT}
  mail:
    from-address: ${APP_MAIL_FROM_ADDRESS:no-reply@alphashopper.local}
  jwt:
    secret: ${APP_JWT_SECRET:alphashopper-local-dev-jwt-secret-key-change-me}
    access-token-expiration-minutes: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:180}
  seed:
    demo-data:
      enabled: ${APP_SEED_DEMO_DATA_ENABLED:false}
  payment:
    provider: ${APP_PAYMENT_PROVIDER:fake}
    toss:
      api-base-url: ${APP_PAYMENT_TOSS_API_BASE_URL:https://api.tosspayments.com}
      secret-key: ${APP_PAYMENT_TOSS_SECRET_KEY:}
      webhook:
        allowed-ip-ranges: ${APP_PAYMENT_TOSS_WEBHOOK_ALLOWED_IP_RANGES:}
        max-skew-seconds: ${APP_PAYMENT_TOSS_WEBHOOK_MAX_SKEW_SECONDS:900}
  ai:
    allow-anonymous: ${APP_AI_ALLOW_ANONYMOUS:true}
    rate-limit:
      enabled: ${APP_AI_RATE_LIMIT_ENABLED:true}
      window-seconds: ${APP_AI_RATE_LIMIT_WINDOW_SECONDS:60}
      max-requests: ${APP_AI_RATE_LIMIT_MAX_REQUESTS:30}
    llm:
      enabled: ${APP_AI_LLM_ENABLED:false}
      base-url: ${APP_AI_LLM_BASE_URL:}
      api-key: ${APP_AI_LLM_API_KEY:}
      model: ${APP_AI_LLM_MODEL:internal-shopping-assistant}
      timeout-ms: ${APP_AI_LLM_TIMEOUT_MS:8000}
    recommendation:
      cache:
        enabled: ${APP_AI_RECOMMENDATION_CACHE_ENABLED:true}
        ttl-seconds: ${APP_AI_RECOMMENDATION_CACHE_TTL_SECONDS:120}
        cache-personalized: ${APP_AI_RECOMMENDATION_CACHE_PERSONALIZED:false}
      click-signal:
        enabled: ${APP_AI_RECOMMENDATION_CLICK_SIGNAL_ENABLED:true}
        window-days: ${APP_AI_RECOMMENDATION_CLICK_SIGNAL_WINDOW_DAYS:30}
        boost-per-click: ${APP_AI_RECOMMENDATION_CLICK_SIGNAL_BOOST_PER_CLICK:2}
        max-click-boost: ${APP_AI_RECOMMENDATION_CLICK_SIGNAL_MAX_CLICK_BOOST:8}
        top-rank-threshold: ${APP_AI_RECOMMENDATION_CLICK_SIGNAL_TOP_RANK_THRESHOLD:2.0}
        top-rank-boost: ${APP_AI_RECOMMENDATION_CLICK_SIGNAL_TOP_RANK_BOOST:2}
        mid-rank-threshold: ${APP_AI_RECOMMENDATION_CLICK_SIGNAL_MID_RANK_THRESHOLD:5.0}
        mid-rank-boost: ${APP_AI_RECOMMENDATION_CLICK_SIGNAL_MID_RANK_BOOST:1}
      ctr-signal:
        enabled: ${APP_AI_RECOMMENDATION_CTR_SIGNAL_ENABLED:true}
        min-impressions: ${APP_AI_RECOMMENDATION_CTR_SIGNAL_MIN_IMPRESSIONS:5}
        high-threshold: ${APP_AI_RECOMMENDATION_CTR_SIGNAL_HIGH_THRESHOLD:0.35}
        high-boost: ${APP_AI_RECOMMENDATION_CTR_SIGNAL_HIGH_BOOST:3}
        mid-threshold: ${APP_AI_RECOMMENDATION_CTR_SIGNAL_MID_THRESHOLD:0.15}
        mid-boost: ${APP_AI_RECOMMENDATION_CTR_SIGNAL_MID_BOOST:1}
        low-threshold: ${APP_AI_RECOMMENDATION_CTR_SIGNAL_LOW_THRESHOLD:0.03}
        low-penalty: ${APP_AI_RECOMMENDATION_CTR_SIGNAL_LOW_PENALTY:1}
        low-action: ${APP_AI_RECOMMENDATION_CTR_SIGNAL_LOW_ACTION:PENALIZE}
      experiment:
        enabled: ${APP_AI_RECOMMENDATION_EXPERIMENT_ENABLED:false}
        ctr-treatment-percent: ${APP_AI_RECOMMENDATION_EXPERIMENT_CTR_TREATMENT_PERCENT:50}
