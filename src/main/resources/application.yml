spring:
  datasource:
    url: jdbc:h2:mem:zigzagshop;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  thymeleaf:
    cache: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  jackson:
    time-zone: Asia/Seoul
  elasticsearch:
    uris: http://localhost:9200
  data:
    elasticsearch:
      repositories:
        enabled: ${app.search.enabled:true}
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: zigzag-notification-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.webjpa.shopping.messaging
        spring.json.value.default.type: com.webjpa.shopping.messaging.OrderNotificationMessage
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 3000
      mail.smtp.writetimeout: 5000

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug

app:
  frontend:
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000
  search:
    enabled: true
    reindex-on-startup: true
  kafka:
    auto-create-topics: true
    topics:
      order-notifications: order-notifications
  mail:
    from-address: no-reply@zigzag.local
  jwt:
    secret: alphashopper-jwt-secret-key-2026-04-15-must-be-long-enough
    access-token-expiration-minutes: 180
