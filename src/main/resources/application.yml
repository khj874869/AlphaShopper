spring:
  application:
    name: zigzag-shop
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate: true
    validate-migration-naming: true
    baseline-on-migrate: false
    out-of-order: false
  jackson:
    time-zone: ${APP_TIME_ZONE:Asia/Seoul}
  data:
    elasticsearch:
      repositories:
        enabled: ${app.search.enabled:false}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.hibernate.SQL: ${APP_LOG_SQL_LEVEL:info}

app:
  auth:
    cookie:
      name: ${APP_AUTH_COOKIE_NAME:alphashopper_access_token}
      secure: ${APP_AUTH_COOKIE_SECURE:false}
      same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
    allowed-origins: ${APP_FRONTEND_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  search:
    enabled: ${APP_SEARCH_ENABLED:false}
    reindex-on-startup: ${APP_SEARCH_REINDEX_ON_STARTUP:false}
  kafka:
    auto-create-topics: ${APP_KAFKA_AUTO_CREATE_TOPICS:false}
    topics:
      order-notifications: ${APP_KAFKA_ORDER_NOTIFICATIONS_TOPIC:order-notifications}
  mail:
    from-address: ${APP_MAIL_FROM_ADDRESS:no-reply@alphashopper.local}
  jwt:
    secret: ${APP_JWT_SECRET:alphashopper-local-dev-jwt-secret-key-change-me}
    access-token-expiration-minutes: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:180}
  seed:
    demo-data:
      enabled: ${APP_SEED_DEMO_DATA_ENABLED:false}
  payment:
    provider: ${APP_PAYMENT_PROVIDER:fake}
    toss:
      api-base-url: ${APP_PAYMENT_TOSS_API_BASE_URL:https://api.tosspayments.com}
      secret-key: ${APP_PAYMENT_TOSS_SECRET_KEY:}
