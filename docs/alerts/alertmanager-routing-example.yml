global:
  resolve_timeout: 5m

route:
  receiver: platform-slack
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: platform-pager
      continue: true
    - matchers:
        - service="zigzag-backend-canary"
      receiver: deploy-war-room
      continue: false
    - matchers:
        - slo="availability"
      receiver: sre-slack
      continue: true

receivers:
  - name: platform-slack
    slack_configs:
      - channel: "#alphashopper-alerts"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"
  - name: sre-slack
    slack_configs:
      - channel: "#alphashopper-sre"
        send_resolved: true
  - name: deploy-war-room
    slack_configs:
      - channel: "#alphashopper-deploy"
        send_resolved: true
  - name: platform-pager
    pagerduty_configs:
      - routing_key: "<replace-with-real-routing-key>"
        severity: critical
