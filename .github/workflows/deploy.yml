name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: Git branch to build and promote
        required: true
        default: main
        type: string

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate before deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Validate toolchain version alignment
        run: bash scripts/verify-toolchain-versions.sh

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: |
          chmod +x ./mvnw
          ./mvnw -B test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Build and promote
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Resolve release commit
        id: release_ref
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ vars.BACKEND_IMAGE_REPO }}:${{ steps.release_ref.outputs.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ vars.FRONTEND_IMAGE_REPO }}:${{ steps.release_ref.outputs.sha }}

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Update environment overlay with immutable image tags
        shell: bash
        run: |
          cd "deploy/k8s/overlays/${{ inputs.environment }}"
          kustomize edit set image ghcr.io/your-org/zigzag-shop-backend=${{ vars.BACKEND_IMAGE_REPO }}:${{ steps.release_ref.outputs.sha }}
          kustomize edit set image ghcr.io/your-org/alphashopper-web=${{ vars.FRONTEND_IMAGE_REPO }}:${{ steps.release_ref.outputs.sha }}

      - name: Commit promoted manifest tags
        shell: bash
        run: |
          if git diff --quiet -- deploy/k8s/overlays/${{ inputs.environment }}/kustomization.yaml; then
            echo "No manifest tag changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/overlays/${{ inputs.environment }}/kustomization.yaml
          git commit -m "chore(release): promote ${{ inputs.environment }} to ${{ steps.release_ref.outputs.sha }}"
          git push origin HEAD:${{ inputs.git_ref }}

      - name: Set up kubectl
        if: inputs.environment == 'staging'
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Configure kubeconfig
        if: inputs.environment == 'staging'
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Wait for Argo CD staging sync to pick up new images
        if: inputs.environment == 'staging'
        env:
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          bash scripts/deploy/wait-for-deployment-image.sh zigzag-backend backend ${{ vars.BACKEND_IMAGE_REPO }}:${{ steps.release_ref.outputs.sha }}
          bash scripts/deploy/wait-for-deployment-image.sh alphashopper-web web ${{ vars.FRONTEND_IMAGE_REPO }}:${{ steps.release_ref.outputs.sha }}

      - name: Wait for staging rollouts
        if: inputs.environment == 'staging'
        run: |
          kubectl rollout status deployment/zigzag-backend -n ${{ vars.K8S_NAMESPACE }} --timeout=10m
          kubectl rollout status deployment/alphashopper-web -n ${{ vars.K8S_NAMESPACE }} --timeout=10m

      - name: Run post-deploy smoke tests
        if: inputs.environment == 'staging'
        env:
          SHOP_BASE_URL: ${{ vars.SHOP_BASE_URL }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          bash scripts/deploy/smoke-test.sh
          bash scripts/deploy/frontend-synthetic-check.sh

      - name: Auto rollback on staging rollout or smoke-test failure
        if: failure() && inputs.environment == 'staging'
        env:
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: bash scripts/deploy/rollback.sh all

      - name: Capture rollout history after rollback
        if: failure() && inputs.environment == 'staging'
        run: |
          kubectl rollout history deployment/zigzag-backend -n ${{ vars.K8S_NAMESPACE }}
          kubectl rollout history deployment/alphashopper-web -n ${{ vars.K8S_NAMESPACE }}

      - name: Production promotion summary
        if: inputs.environment == 'production'
        run: |
          echo "Production desired state updated in git." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- branch: \`${{ inputs.git_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- backend image: \`${{ vars.BACKEND_IMAGE_REPO }}:${{ steps.release_ref.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- frontend image: \`${{ vars.FRONTEND_IMAGE_REPO }}:${{ steps.release_ref.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- next step: manually sync the production Argo CD child applications" >> "$GITHUB_STEP_SUMMARY"

      - name: Capture deployment status on failure
        if: failure() && inputs.environment == 'staging'
        run: |
          kubectl get pods -n ${{ vars.K8S_NAMESPACE }} -o wide
          kubectl describe deployment zigzag-backend -n ${{ vars.K8S_NAMESPACE }}
          kubectl describe deployment alphashopper-web -n ${{ vars.K8S_NAMESPACE }}

      - name: Notify Slack
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: Deploy workflow (${{ inputs.environment }})
          SLACK_STATUS: ${{ job.status == 'success' && 'success' || 'failed' }}
          SLACK_DETAILS: |
            branch=${{ inputs.git_ref }}
            commit=${{ steps.release_ref.outputs.sha }}
            actor=${{ github.actor }}
            mode=${{ inputs.environment == 'staging' && 'staging auto-sync validation' || 'production desired-state update only' }}
          SLACK_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/deploy/slack-notify.sh
