name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate shell script syntax
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Validate toolchain version alignment
        run: bash scripts/verify-toolchain-versions.sh

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        run: |
          chmod +x ./mvnw
          ./mvnw -B test

  windows-tooling:
    name: Windows tooling
    runs-on: windows-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PowerShell script syntax
        run: |
          $failures = @()
          Get-ChildItem scripts -Filter *.ps1 -Recurse | ForEach-Object {
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $failures += "$($_.FullName): $($parseErrors | ForEach-Object { $_.Message } | Join-String -Separator '; ')"
            }
          }

          if ($failures.Count -gt 0) {
            $failures | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Validate toolchain version alignment
        run: powershell -ExecutionPolicy Bypass -File .\scripts\verify-toolchain-versions.ps1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm.cmd ci

      - name: Lint
        working-directory: frontend
        run: npm.cmd run lint

      - name: Build
        working-directory: frontend
        run: npm.cmd run build

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate shell script syntax
        run: |
          find ../scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Validate toolchain version alignment
        run: bash ../scripts/verify-toolchain-versions.sh

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Docker Compose config
        run: docker compose config

  docker-images:
    name: Docker image builds
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell script syntax
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Validate toolchain version alignment
        run: bash scripts/verify-toolchain-versions.sh

      - name: Build backend image
        env:
          BACKEND_IMAGE_TAG: zigzag-shop-backend:ci
        run: bash scripts/build-images.sh backend

      - name: Build frontend image
        env:
          FRONTEND_IMAGE_TAG: alphashopper-web:ci
        run: bash scripts/build-images.sh frontend

  k8s:
    name: Kustomize overlays
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Validate staging overlay
        run: kubectl kustomize deploy/k8s/overlays/staging > /dev/null

      - name: Validate production overlay
        run: kubectl kustomize deploy/k8s/overlays/production > /dev/null

      - name: Validate staging canary overlay
        run: kubectl kustomize deploy/k8s/canary/overlays/staging > /dev/null

      - name: Validate production canary overlay
        run: kubectl kustomize deploy/k8s/canary/overlays/production > /dev/null

      - name: Validate staging monitoring overlay
        run: kubectl kustomize deploy/k8s/monitoring/overlays/staging > /dev/null

      - name: Validate production monitoring overlay
        run: kubectl kustomize deploy/k8s/monitoring/overlays/production > /dev/null

      - name: Validate availability SLO alert rules
        run: rg -n "AlphaShopperAvailabilityErrorBudgetBurnFast|AlphaShopperAvailabilityErrorBudgetBurnSlow|AlphaShopperCanaryAvailabilityRegression" docs/alerts/availability-slo-alerts.yml deploy/k8s/monitoring/base/prometheus-rule.yaml

      - name: Validate staging ingress monitoring overlay
        run: kubectl kustomize deploy/k8s/monitoring/ingress/overlays/staging > /dev/null

      - name: Validate production ingress monitoring overlay
        run: kubectl kustomize deploy/k8s/monitoring/ingress/overlays/production > /dev/null

      - name: Validate staging secrets overlay
        run: kubectl kustomize deploy/k8s/secrets/overlays/staging > /dev/null

      - name: Validate production secrets overlay
        run: kubectl kustomize deploy/k8s/secrets/overlays/production > /dev/null

      - name: Validate Argo CD manifests
        run: rg -n "kind: AppProject|kind: Application|repoURL: https://github.com/khj874869/AlphaShopper.git|targetRevision: main|sync-wave" deploy/argocd

      - name: Validate Argo CD production sync assets
        run: rg -n "syncWindows|manualSync: true|Production Sync|argocd app sync|ARGOCD_SERVER|ARGOCD_AUTH_TOKEN" deploy/argocd/projects/alphashopper-project.yaml .github/workflows/production-sync.yml scripts/deploy/argocd-sync.sh

      - name: Validate release day runbook assets
        run: rg -n "Release Day Runbook|Phase 1: Preflight|production-sync.yml|argocd-app-status.sh|Stop Conditions" docs/release-day-runbook.md scripts/deploy/argocd-app-status.sh deploy/k8s/README.md docs/production-release-checklist.md

      - name: Validate Slack notification assets
        run: rg -n "slack-notify.sh|SLACK_WEBHOOK_URL|Notify Slack|Slack notification" scripts/deploy/slack-notify.sh .github/workflows/deploy.yml .github/workflows/canary.yml .github/workflows/production-sync.yml deploy/k8s/README.md docs/production-release-checklist.md
